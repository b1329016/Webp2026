<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>HW2 - 資工選課表</title>
    <style>
        /* 表格樣式 */
        table { font-family: Arial, sans-serif; border-collapse: collapse; width: 100%; }
        td, th { border: 1px solid #ddd; padding: 8px; cursor: pointer; }
        th { background-color: #04AA6D; color: white; text-align: left; padding-bottom: 12px; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        tr:hover { background-color: #ddd; }

        /* Popover 彈窗樣式 */
        #course_popover {
            width: 60%; 
            height: 90%; 
            padding: 0; 
            border: 1px solid #ccc; 
            border-radius: 8px;
            overflow: hidden;
        }
        
        #course_frame {
            width: 100%; 
            height: 100%; 
            border: none;
        }

        .close-btn {
            position: absolute; 
            right: 10px; 
            top: 10px; 
            z-index: 10;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>資工選課表</h1>

    <table id="csie">
        <thead>
            <tr>
                <th>開課單位</th>
                <th>課程名稱</th>
                <th>授課教師</th>
            </tr>
        </thead>
        <tbody>
            <tr onclick="openCourse('https://catalog.cgu.edu.tw/coursedata?sectionid=A2337')">
                <td>資工系</td>
                <td>物件導向軟體設計</td>
                <td>黃崇源</td>
            </tr>
            <tr onclick="openCourse('https://catalog.cgu.edu.tw/coursedata?sectionid=61602')">
                <td>資工系</td>
                <td>計算機網路實驗</td>
                <td>李春良</td>
            </tr>
            <tr onclick="openCourse('https://catalog.cgu.edu.tw/coursedata?sectionid=61603')">
                <td>資工系</td>
                <td>作業系統實務</td>
                <td>張哲維</td>
            </tr>
            <tr onclick="openCourse('https://catalog.cgu.edu.tw/coursedata?sectionid=71796')">
                <td>資工系</td>
                <td>生物統計</td>
                <td>陳光武</td>
            </tr>
            <tr onclick="openCourse('https://catalog.cgu.edu.tw/coursedata?sectionid=A2339')">
                <td>資工系</td>
                <td>通訊系統</td>
                <td>陳仁暉</td>
            </tr>
            <tr onclick="openCourse('https://catalog.cgu.edu.tw/coursedata?sectionid=56665')">
                <td>資工系</td>
                <td>軟硬體專題(2)</td>
                <td>魏志達</td>
            </tr>
        </tbody>
    </table>

    <br>
    <button onclick="changeResult()">Change</button>

    <div id="course_popover" popover>
        <button class="close-btn" onclick="document.getElementById('course_popover').hidePopover()">關閉</button>
        <iframe id="course_frame" src=""></iframe>
    </div>

    <script>
        // 1. 顯示 Popover 並載入網址
        function openCourse(url) {
            var frame = document.getElementById('course_frame');
            frame.src = url;
            var popover = document.getElementById('course_popover');
            popover.showPopover();
        }

        // 2. 修改表格內容 (將黃崇源改為李春良)
        function changeResult() {
            var myTable = document.getElementById("csie");
            // rows[1] 是資料的第一列，cells[2] 是第三格(老師)
            if (myTable.rows.length > 1) {
                myTable.rows[1].cells[2].innerHTML = "李春良";
            }
        }
    </script>

</body>
</html>
