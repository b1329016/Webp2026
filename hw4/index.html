<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Ajax 分頁與搜尋功能</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 30px; }
        th { background-color: #00a86b; color: white; }
    </style>
</head>
<body>

    <h2 class="mb-4">景點觀光展覽資訊</h2>

    <div class="mb-3">
        <label for="searchInput" class="form-label">名稱搜尋：</label>
        <input type="text" id="searchInput" class="form-control" placeholder="輸入關鍵字..." onchange="handleSearch()">
    </div>

    <table id="csie" class="table table-striped table-bordered table-hover">
        <thead>
            <tr>
                <th>名稱</th>
                <th>地點</th>
                <th>票價</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="d-flex justify-content-between align-items-center mt-3">
        <div>
            <button class="btn btn-secondary" onclick="prevPage()">上一頁</button>
            <button class="btn btn-secondary" onclick="nextPage()">下一頁</button>
        </div>
        <div id="pageInfo">
            目前第 1 頁 / 總共 1 頁
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>


<body>
    <script>
var allData = [];      // 原始總資料
var filteredData = []; // 搜尋過濾後的資料
var currentPage = 1;   // 目前頁碼
var pageSize = 10;     // 每頁筆數

// 1. Ajax 抓取資料
var openUrl = "https://cloud.culture.tw/frontsite/trans/SearchShowAction.do?method=doFindTypeJ&category=6";
var xhr = new XMLHttpRequest();
xhr.open('GET', openUrl, true);
xhr.send();

xhr.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
        allData = JSON.parse(this.responseText);
        filteredData = allData; // 初始時過濾資料等於總資料
        renderTable();
    }
};

// 2. 渲染表格的主要函數
function renderTable() {
    var tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = ""; // 清空舊資料

    // 計算分頁範圍
    var start = (currentPage - 1) * pageSize;
    var end = start + pageSize;
    var pageData = filteredData.slice(start, end);

    // 填入資料
    pageData.forEach(function(data) {
        var row = tableBody.insertRow(-1);
        row.insertCell(0).innerHTML = data['title'];
        var info = data['showInfo'][0];
        row.insertCell(1).innerHTML = info ? info['location'] : "無地點";
        row.insertCell(2).innerHTML = info ? info['price'] : "無票價";
    });

    updatePageInfo();
}

// 3. 更新頁碼資訊
function updatePageInfo() {
    var totalPages = Math.ceil(filteredData.length / pageSize) || 1;
    document.getElementById("pageInfo").innerHTML = `目前第 ${currentPage} 頁 / 總共 ${totalPages} 頁`;
}

// 4. 名稱搜尋功能 (Onchange event)
function handleSearch() {
    var keyword = document.getElementById("searchInput").value.toLowerCase();
    
    // 過濾資料：標題包含關鍵字
    filteredData = allData.filter(function(item) {
        return item.title.toLowerCase().includes(keyword);
    });

    currentPage = 1; // 搜尋後回到第一頁
    renderTable();
}

// 5. 分頁控制
function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        renderTable();
    }
}

function nextPage() {
    var totalPages = Math.ceil(filteredData.length / pageSize);
    if (currentPage < totalPages) {
        currentPage++;
        renderTable();
    }
}

    </script>
</body>
